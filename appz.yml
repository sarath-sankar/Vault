app:
    name: Vault
    code: VAULT
    notify: ssankar@ecloudcontrol.com

build:
    version: 0.4
    env: DEV2
    build_file: none
    output_files: output/*.zip
    image_template: vault-2.0

deploy:
    context: alpha/DEV2
    type: statefulset
    ingress: none
    replicas: 1
    #hardening: true
    port:
    - 8200
    - 80

volumes:
  - claim: vault-home
    mount: /appz/home
    name: home
    size: 5Gi
  - claim: vault-data
    mount: /appz/data
    name: data
    size: 5Gi

properties:
    ENABLE_AUTO_PASSWORD: True
    revision: 2
